<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AgriChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">🌾</div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to AgriChain Supply Network</div>
    </div>

    <div class="auth-body">
      {% if error %}
        <div class="alert alert-danger" style="margin-bottom:16px">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>{{ error }}</span>
        </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" id="username" name="username" placeholder="Enter your username" required autofocus>
        </div>

        <div class="form-group" style="margin-bottom:20px">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" id="password" name="password" type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
      </form>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Create one →</a>
    </div>

  </div>
</div>
</body>
</html>
